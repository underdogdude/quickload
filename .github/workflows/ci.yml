name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint → Typecheck → Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @quickload/user exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @quickload/user lint

      - name: Unit tests
        run: pnpm --filter @quickload/user test
        env:
          IRON_SESSION_PASSWORD: "test-password-must-be-at-least-32-characters-long"
          THAIBULKSMS_OTP_API_KEY: "test-key"
          THAIBULKSMS_OTP_API_SECRET: "test-secret"
